    <style>
        img {
            /*display: block;*/
            /*margin-left: auto;*/
            /*margin-right: auto;*/
            width: 35%
        }

        #gamecontainer {
            width: 800px;
            height: 600px;
            border: 1px solid black;
            position: relative;
            margin: 0 auto; }

        canvas{ position: absolute; z-index: 11 }

        #gamestartscreen {
            position: absolute;
            margin: 0 auto;
            top: 0;
            /*left: 300px;*/
            width: 100%;
            height: 100%;
            z-index: -2;}

        body {
            margin: 0;
        }

        .leap-boneHand {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 600px;
        }

        #view-source {
            position: absolute;
            top: 0;
            right: 0;
            margin: 10px;
            z-index: 10;
        }
    </style>
</head>
<body>


    <div class="gamecontainer" style="display:table-row;background-color:transparent;">
        <canvas class="leap-boneHand"></canvas>
        <div id="gamestartscreen">
            <img id="bg" src="{{ url_for('video_feed') }}"/>
        </div>
    </div>
    <script>
        // Set up plugins
        Leap.loop({background: true})
        .use('transform', {
            vr: true//'desktop' // Switch to meters. true = optimized for head
        })
        .use('boneHand', {
            targetEl: document.body,
            jointColor: new THREE.Color(0xffffff),
            rendererOps: {antialias: true}
        })
        .use('proximity');
    </script>
</body>
